<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>audit-reports</title>

  <link rel="stylesheet" href="../../0-core/css/reset.css">
  <link rel="stylesheet" href="../../0-core/css/tokens.css">
  <link rel="stylesheet" href="../../0-core/css/components.css">
  <link rel="stylesheet" href="../../0-core/css/layout.css">
  <link rel="stylesheet" href="audit-reports.css">

  <script src="../../0-core/js/permissions.js" defer></script>
  <script src="../../0-core/js/roles.js" defer></script>
  <script src="../../0-core/js/auth.js" defer></script>
  <script src="../../0-core/js/access.js" defer></script>
  <script src="../../0-core/js/ui.js" defer></script>
  <script src="audit-reports.js" defer></script>
</head>

<body data-page="audit-reports">
  <div id="header"></div>

  <div id="access-denied" hidden>You do not have access to this page.</div>

  <div id="page-content" class="page-container" hidden>
    <h1>audit-reports</h1>
    <p>This is the audit-reports page template.</p>
  </div>

  <script>
    fetch("../../1-shared/header.html").then(r => r.text()).then(html => header.innerHTML = html);

    const page = "audit-reports";
    const roles = window.currentUserRoles;

    if (hasAccess(page, roles)) document.getElementById("page-content").hidden = false;
    else document.getElementById("access-denied").hidden = false;
  </script>
</body>
</html>
