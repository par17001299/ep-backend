<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{PAGE_NAME}}</title>

  <link rel="stylesheet" href="../../0-core/css/reset.css">
  <link rel="stylesheet" href="../../0-core/css/tokens.css">
  <link rel="stylesheet" href="../../0-core/css/components.css">
  <link rel="stylesheet" href="../../0-core/css/layout.css">
  <link rel="stylesheet" href="{{PAGE_NAME}}.css">

  <script src="../../0-core/js/permissions.js" defer></script>
  <script src="../../0-core/js/roles.js" defer></script>
  <script src="../../0-core/js/auth.js" defer></script>
  <script src="../../0-core/js/access.js" defer></script>
  <script src="../../0-core/js/ui.js" defer></script>
  <script src="{{PAGE_NAME}}.js" defer></script>
</head>

<body data-page="{{PAGE_NAME}}">
  <!-- Shared header -->
  <div id="header"></div>

  <div id="access-denied" hidden>You do not have access to this page.</div>

  <div id="page-content" class="page-container" hidden>
    <h1>{{PAGE_NAME}}</h1>
    <p>This is the {{PAGE_NAME}} page template.</p>
  </div>

  <script>
    // Inject shared header
    fetch("../../1-shared/header.html")
      .then(r => r.text())
      .then(html => document.getElementById("header").innerHTML = html);

    const page = document.body.dataset.page;
    const roles = window.currentUserRoles;

    if (hasAccess(page, roles)) {
      document.getElementById("page-content").hidden = false;
    } else {
      document.getElementById("access-denied").hidden = false;
    }
  </script>
</body>
</html>
