<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link rel="stylesheet" href="../../0-core/css/reset.css">
  <link rel="stylesheet" href="../../0-core/css/tokens.css">
  <link rel="stylesheet" href="../../0-core/css/components.css">
  <link rel="stylesheet" href="login.css">

  <script src="login.js" defer></script>
</head>

<body class="auth-body">
  <div class="auth-container neo-glass">
    <h1 class="auth-title">Sign In</h1>

    <div class="auth-field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username">
    </div>

    <div class="auth-field password-field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
      <button class="toggle-password" id="togglePassword">Show</button>
    </div>

    <button class="auth-button ember-glow" id="loginButton">Sign In</button>

    <div class="auth-footer">
      <a href="#" class="forgot-link">Forgot your password</a>
    </div>
  </div>
</body>
</html>
